[package]
name = "akua-cli"
description = "Akua command-line tool"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lib]
name = "akua_cli"
path = "src/lib.rs"

[[bin]]
name = "akua"
path = "src/main.rs"

[features]
# Mirror akua-core's SDK-export features so types defined in this crate
# (e.g. VersionOutput) land in the generated bindings + bundle.
ts-export = ["akua-core/ts-export", "dep:ts-rs"]
schema-export = ["akua-core/schema-export", "dep:schemars"]

[dependencies]
akua-core = { path = "../akua-core" }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
ts-rs = { version = "11", optional = true }
schemars = { version = "1", optional = true }

[dev-dependencies]
tempfile = "3"

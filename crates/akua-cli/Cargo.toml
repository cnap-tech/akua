[package]
name = "akua-cli"
description = "Akua command-line tool"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lib]
name = "akua_cli"
path = "src/lib.rs"

[[bin]]
name = "akua"
path = "src/main.rs"

[features]
# Pass-through to akua-core's feature of the same name.
engine-helm-shell = ["akua-core/engine-helm-shell"]
engine-kustomize-shell = ["akua-core/engine-kustomize-shell"]

[dependencies]
akua-core = { path = "../akua-core" }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = "3"

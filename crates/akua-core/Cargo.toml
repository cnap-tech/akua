[package]
name = "akua-core"
description = "Akua's core pipeline: source fetch, umbrella chart generation, WASM transforms, render"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
# `engine-helmfile` is OFF by default — helmfile.yaml templates support
# `exec`, `readFile`, `requiredEnv`, and other side-effecting Go-template
# functions. A malicious package's helmfile can execute arbitrary
# commands at build time. Only enable this feature when you trust every
# package you build. See SECURITY.md §"Helmfile engine".
default = ["helm-cli", "engine-kcl", "publish", "helm-wasm"]
# Shell-to-helm rendering (not WASM-safe — requires std::process and tempfile).
# Depends on `fetch` so helm-cli render can pre-populate `charts/` via
# akua's audited fetcher (SSRF guard + size caps) and skip the unsafe
# `helm dependency update` network path.
helm-cli = ["dep:tempfile", "fetch"]
# Embedded Helm v4 template engine via helm-engine-wasm (Go→wasip1 +
# wasmtime). Kills the helm CLI dep for template rendering. Remote-dep
# fetching still requires a separate tool until a native oras-based
# fetcher lands.
helm-wasm = ["dep:helm-engine-wasm", "dep:tar", "dep:flate2", "fetch"]
# Native HTTP + OCI chart dep fetcher — replaces `helm dependency update`.
# `oci-client` stays in the dep list for `publish`; the fetch path uses
# raw reqwest streaming so there's no layer-sized in-memory buffer.
fetch = [
    "dep:oci-client",
    "dep:tar",
    "dep:flate2",
    "dep:tokio",
    "dep:tempfile",
    "dep:sha2",
    "dep:base64",
]
# Native OCI publish via oci-client. No helm CLI needed for `akua publish`.
publish = ["dep:oci-client", "dep:tar", "dep:flate2", "dep:tokio", "dep:tempfile"]
# KCL engine — native Rust via kcl-lang/lib (git dep). Not WASM-safe;
# browser consumers use @kcl-lang/wasm-lib on the JS side and pass rendered
# YAML into akua-wasm's umbrella assembler separately.
engine-kcl = ["dep:kcl-lang"]
# helmfile engine — shells to `helmfile`. Not WASM-safe.
engine-helmfile = []

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
cel-interpreter = { version = "0.10", default-features = false }
time = { version = "0.3", default-features = false, features = ["std", "formatting"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, optional = true }
async-trait = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
reqwest = { workspace = true }
tempfile = { version = "3", optional = true }
kcl-lang = { git = "https://github.com/kcl-lang/lib", optional = true }
oci-client = { version = "0.16", default-features = false, features = ["rustls-tls"], optional = true }
tar = { version = "0.4", optional = true }
flate2 = { version = "1", optional = true }
helm-engine-wasm = { path = "../helm-engine-wasm", optional = true }
sha2 = { version = "0.10", optional = true }
base64 = { version = "0.22", optional = true }

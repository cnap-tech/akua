[package]
name = "akua-core"
description = "Akua core library: lockfile/manifest parsers, Package.k loader, render output writer, CLI contract primitives"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
default = ["engine-kcl"]
# KCL engine — native Rust via kcl-lang/lib (git dep). Not WASM-safe.
engine-kcl = ["dep:kcl-lang", "dep:sha2"]
# Helm rendering via shell-out to the `helm` binary on PATH.
# Transitional MVP; violates the "embedded by default" invariant and
# will be superseded by an embedded WASM engine (engine-helm-wasm,
# not yet reintroduced). Requires `engine-kcl` because it plugs into
# the KCL plugin bridge.
engine-helm-shell = ["engine-kcl"]
# Emit TypeScript type definitions from serde types. Off by default;
# enable only when regenerating @akua/sdk type bindings:
# `cargo test -p akua-core --features ts-export export_bindings`.
ts-export = ["dep:ts-rs"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
ts-rs = { version = "11", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kcl-lang = { git = "https://github.com/kcl-lang/lib", optional = true }
sha2 = { version = "0.10", optional = true }

[dev-dependencies]
tempfile = "3"

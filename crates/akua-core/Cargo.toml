[package]
name = "akua-core"
description = "Akua's core pipeline: source fetch, umbrella chart generation, WASM transforms, render"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
default = ["helm-cli", "engine-kcl", "engine-helmfile"]
# Shell-to-helm rendering (not WASM-safe — requires std::process and tempfile).
helm-cli = ["dep:tempfile"]
# KCL engine plugin — shells to the `kcl` CLI. Not WASM-safe.
engine-kcl = []
# helmfile engine plugin — shells to `helmfile`. Not WASM-safe.
engine-helmfile = []

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
cel-interpreter = { version = "0.10", default-features = false }
time = { version = "0.3", default-features = false, features = ["std", "formatting"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
reqwest = { workspace = true }
tempfile = { version = "3", optional = true }

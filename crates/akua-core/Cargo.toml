[package]
name = "akua-core"
description = "Akua core library: lockfile/manifest parsers, Package.k loader, render output writer, CLI contract primitives"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
default = ["engine-kcl"]
# KCL engine — native Rust via kcl-lang/lib (git dep).
# Embedded wasm engines (helm, kustomize) arrive as separate crates
# hosted inside akua-core via wasmtime; see docs/roadmap.md Phases 1+3.
# No shell-out: CLAUDE.md "Sandboxed by default. No shell-out, ever."
engine-kcl = ["dep:kcl-lang", "dep:sha2"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kcl-lang = { git = "https://github.com/kcl-lang/lib", optional = true }
sha2 = { version = "0.10", optional = true }

[dev-dependencies]
tempfile = "3"

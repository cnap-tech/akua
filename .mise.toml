# Tool versions for the akua workspace.
# Install via `mise install`. Keeps contributors + CI on the same versions.

[tools]
rust = "1.95.0"
task = "3.48.0"
# Bun runs @akua/sdk tests (`task sdk:test`) and resolves deps for the
# TS SDK package (`task sdk:install`). Bun's native TS support means no
# node + no --experimental-strip-types flag.
bun = "1.3.9"

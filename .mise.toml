# Tool versions for the akua workspace.
# Install via `mise install`. Keeps contributors + CI on the same versions.

[tools]
rust = "1.95.0"
task = "3.48.0"
# Shell-out engines: helm.template + kustomize.build plug into the
# corresponding akua-core `engine-*-shell` features and expect these
# binaries on PATH. Pin versions so examples + integration tests
# render identically everywhere.
helm      = "4.1.4"
kustomize = "5.8.1"
# Bun runs @akua-dev/sdk tests (`task sdk:test`) and resolves deps for the
# TS SDK package. Bun's native TS support means no node + no
# `--experimental-strip-types` flag.
bun       = "1.3.9"
# Go compiles the embedded helm/kustomize engines to wasm32-wasip1 via
# `task build:helm-engine-wasm` / `build:kustomize-engine-wasm`. Pinned
# so engine sha256 matches between dev + CI builds. Matches the
# `go 1.25.x` directive in each engine go-src/go.mod.
go        = "1.25.0"

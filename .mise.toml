# Tool versions for the akua workspace.
# Install via `mise install`. Keeps contributors + CI on the same versions.

[tools]
rust = "1.95.0"
task = "3.48.0"
# Shell-out engines: helm.template + kustomize.build plug into the
# corresponding akua-core `engine-*-shell` features and expect these
# binaries on PATH. Pin versions so examples + integration tests
# render identically everywhere.
helm      = "4.1.4"
kustomize = "5.8.1"

version: "3"

# Akua dev tasks. Run `task --list` to see available tasks.

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build the Rust workspace
    cmds:
      - cargo build --workspace

  test:
    desc: Run all Rust tests
    cmds:
      - cargo test --workspace

  check:
    desc: cargo check + clippy
    cmds:
      - cargo check --workspace
      - cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    desc: Format Rust code
    cmds:
      - cargo fmt --all

  fmt:check:
    desc: Check Rust formatting (no writes)
    cmds:
      - cargo fmt --all -- --check

  lint:
    desc: Run cargo clippy with warnings as errors
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  ci:
    desc: Run the full CI pipeline locally
    cmds:
      - task: fmt:check
      - task: lint
      - task: test
      - task: sdk:check

  # ---------------------------------------------------------------------------
  # SDK — generated TS types + JSON Schema bundle + @akua/sdk package
  # ---------------------------------------------------------------------------

  sdk:gen:
    desc: Regenerate sdk-types/*.ts and sdk-schemas/akua.json from Rust serde types
    cmds:
      - cargo test -p akua-core --features ts-export --lib -- export_bindings
      - cargo test -p akua-cli  --features ts-export --lib -- export_bindings
      - cargo test -p akua-cli  --features ts-export,schema-export --test export_sdk_bundle

  sdk:check:
    desc: Fail if generated SDK artifacts drift from the Rust source
    cmds:
      - task: sdk:gen
      - git diff --exit-code -- sdk-types sdk-schemas

  sdk:install:
    desc: Install @akua/sdk deps (bun)
    dir: packages/sdk
    cmds:
      - bun install --frozen-lockfile
    sources:
      - package.json
      - bun.lock
    generates:
      - node_modules/.package-lock.json

  sdk:test:
    desc: Run @akua/sdk TS unit tests (bun — native TS, no transpile step)
    deps: [sdk:install]
    dir: packages/sdk
    cmds:
      - bun test

  release:local:
    desc: Build the release binary locally
    cmds:
      - cargo build --release -p akua-cli
      - ls -lh target/release/akua

  release:target:
    desc: Build akua for a specific Rust target (used by the release workflow)
    vars:
      TARGET: '{{.TARGET | default "x86_64-unknown-linux-gnu"}}'
      CARGO: '{{.CARGO | default "cargo"}}'
    cmds:
      - '{{.CARGO}} build --release -p akua-cli --target {{.TARGET}}'
      - ls -lh target/{{.TARGET}}/release/akua

  clean:
    desc: Remove Rust target/
    cmds:
      - cargo clean

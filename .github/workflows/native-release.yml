name: native-release

# Cross-platform build + npm publish of the napi addon.
# Triggered by `native-v<semver>` tag pushes.
#
# Layout:
#   `@akua-dev/native`                       — meta package; declares
#                                              optionalDependencies on
#                                              every per-platform pkg
#   `@akua-dev/native-{darwin,linux,win32}-*` — per-platform .node binary
#
# The SDK release workflow pins `@akua-dev/native@<same-version>` in
# its dependencies, so this must publish first.

on:
  push:
    tags:
      - 'native-v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Skip the actual publish (build + pack only)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write  # npm provenance

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-14
            target: aarch64-apple-darwin
          # macos-13 (Intel) runners are being deprecated and queue for
          # 40min+. Cross-compile x86_64 from macos-14 (arm64) instead;
          # rustc + Apple SDK handle this without extra setup.
          - host: macos-14
            target: x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Pin to the same rust version mise installs (`.mise.toml`) so
      # the cross-compile target lands on the toolchain mise will
      # later activate. With `@stable`, mise's rust 1.95.0 became the
      # active toolchain after this step ran and cargo couldn't find
      # the target — `note: the X target may not be installed`.
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-${{ matrix.target }}
          cache-on-failure: true

      - name: Bump package.json version from the tag
        shell: bash
        run: |
          set -eu
          version="${GITHUB_REF_NAME#native-v}"
          echo "Building @akua-dev/native@${version}"
          jq --arg v "$version" '.version = $v' \
            crates/akua-napi/package.json > crates/akua-napi/package.json.tmp
          mv crates/akua-napi/package.json.tmp crates/akua-napi/package.json

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install napi deps
        working-directory: crates/akua-napi
        run: bun install --frozen-lockfile

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Build engine wasm (Go → wasip1)
        # Per-platform `.node` ships without engines (embed-engines
        # OFF). The bytes load at runtime from
        # `@akua-dev/native-engines`, but we still need the wasm
        # files on disk during the matrix build because the engine
        # crates' build.rs stages them into OUT_DIR even when
        # include_bytes! is gated off (the placeholder logic
        # tolerates a missing wasm file but the staged wasm is
        # uploaded as part of the engines artifact below).
        #
        # Linux only — the helm fork's `apply.sh` needs bash, which
        # the Windows runner can't natively exec, and macOS runners
        # don't ship the .wasm artifact anyway (only the linux jobs
        # upload it). The Rust crates' build.rs tolerates a missing
        # wasm under embed-engines OFF.
        if: runner.os == 'Linux'
        run: mise exec -- task build:engines

      - name: Upload engine wasm artifact (linux runners — redundant)
        # Both linux-gnu runners upload the artifact with `overwrite:
        # true` so a single failed runner doesn't take down the
        # publish job. Go → wasip1 is deterministic — every runner
        # produces byte-identical output, so the overwrite races
        # benignly. Limited to linux jobs because that's where the
        # Go toolchain is available + fast; the windows / mac runners
        # in the matrix don't run `task build:engines`.
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: native-engines-wasm
          path: |
            crates/helm-engine-wasm/assets/helm-engine.wasm
            crates/kustomize-engine-wasm/assets/kustomize-engine.wasm
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - uses: mlugg/setup-zig@v2
        if: matrix.cross == true
        with:
          version: 0.14.1

      - uses: taiki-e/install-action@v2
        if: matrix.cross == true
        with:
          tool: cargo-zigbuild

      - name: Build native (release)
        working-directory: crates/akua-napi
        shell: bash
        # `-x` tells napi to use cargo-zigbuild for cross-compile.
        # zigbuild knows how to set ARM ASM defines for ring and ships
        # its own musl toolchain — fixes both the napi-cross __ARM_ARCH
        # failure and the missing-musl-gcc problem in one step.
        run: |
          set -eu
          if [ "${{ matrix.cross }}" = "true" ]; then
            bunx napi build --platform --release --target ${{ matrix.target }} -x
          else
            bunx napi build --platform --release --target ${{ matrix.target }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: crates/akua-napi/*.node
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        # Node 24 ships npm 11.x which has OIDC trusted-publishing
        # support. Node 22 ships npm 10.x (no trust support) and
        # `npm install -g npm@latest` from there hits a known
        # promise-retry self-upgrade bug. setup-node's `registry-url`
        # is omitted on purpose: it writes a `.npmrc` containing a
        # literal placeholder `_authToken=${NODE_AUTH_TOKEN}` that
        # intercepts OIDC.
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2

      - name: Bump package.json version from the tag
        run: |
          set -eu
          version="${GITHUB_REF_NAME#native-v}"
          jq --arg v "$version" '.version = $v' \
            crates/akua-napi/package.json > crates/akua-napi/package.json.tmp
          mv crates/akua-napi/package.json.tmp crates/akua-napi/package.json

      - name: Install napi deps
        working-directory: crates/akua-napi
        run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          path: crates/akua-napi/artifacts

      - name: Generate per-platform npm dirs
        working-directory: crates/akua-napi
        run: bunx napi create-npm-dirs

      - name: Move artifacts into the per-platform npm dirs
        working-directory: crates/akua-napi
        run: bunx napi artifacts

      - name: List staged packages
        working-directory: crates/akua-napi
        run: ls -R npm

      - name: Stage engines into the npm package dir
        # Bump version + copy the wasm bytes (downloaded above as the
        # `native-engines-wasm` artifact) into the engines package
        # source layout so `npm publish` finds them.
        run: |
          set -eu
          version="${GITHUB_REF_NAME#native-v}"
          cp crates/akua-napi/artifacts/native-engines-wasm/helm-engine-wasm/assets/helm-engine.wasm \
             crates/akua-native-engines-npm/helm-engine.wasm
          cp crates/akua-napi/artifacts/native-engines-wasm/kustomize-engine-wasm/assets/kustomize-engine.wasm \
             crates/akua-native-engines-npm/kustomize-engine.wasm
          jq --arg v "$version" '.version = $v' \
            crates/akua-native-engines-npm/package.json \
            > crates/akua-native-engines-npm/package.json.tmp
          mv crates/akua-native-engines-npm/package.json.tmp \
             crates/akua-native-engines-npm/package.json

      - name: Publish all packages
        # Auth via npm trusted publishing (OIDC). Order is load-
        # bearing: engines first (per-platform packages don't depend
        # on it but the meta `@akua-dev/native` does), then per-
        # platform `.node` packages, then the meta which declares
        # optionalDependencies on all of them + a regular dep on
        # engines.
        if: github.event_name == 'push' || inputs.dry-run == false
        run: |
          set -eu
          echo "Publishing @akua-dev/native-engines"
          (cd crates/akua-native-engines-npm && npm publish --access public --provenance)
          for dir in crates/akua-napi/npm/*/; do
            echo "Publishing ${dir}"
            (cd "$dir" && npm publish --access public --provenance)
          done
          echo "Publishing meta @akua-dev/native"
          (cd crates/akua-napi && npm publish --access public --provenance)

      - name: Pack only (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == true
        run: |
          set -eu
          (cd crates/akua-native-engines-npm && npm pack --dry-run)
          for dir in crates/akua-napi/npm/*/; do
            (cd "$dir" && npm pack --dry-run)
          done
          (cd crates/akua-napi && npm pack --dry-run)

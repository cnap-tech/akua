name: sdk-publish

# Publishes @akua/sdk to jsr.io on tag push. Uses GitHub's OIDC token
# (id-token: write) — JSR verifies it and grants publish rights without
# any stored secret. See https://jsr.io/docs/publishing-packages#publishing-from-github-actions.
#
# Trigger: push a tag of the form `sdk-v<semver>` (e.g. `sdk-v0.1.0`).
# The version in `packages/sdk/jsr.json` must match the tag's version
# segment; the workflow verifies that before publishing.

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (do not publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # required for JSR OIDC auth

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Build both wasm-pack targets and copy into packages/sdk/wasm/
        run: mise exec -- task sdk:wasm

      - name: Run SDK tests (node target)
        run: mise exec -- task sdk:test

      - name: Check jsr.json version matches the git tag (when tag-triggered)
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          tag_version="${GITHUB_REF_NAME#sdk-v}"
          jsr_version=$(jq -r .version packages/sdk/jsr.json)
          if [ "$tag_version" != "$jsr_version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} → version ${tag_version}, but jsr.json says ${jsr_version}"
            exit 1
          fi

      - name: JSR dry-run
        if: ${{ inputs.dry_run }}
        run: cd packages/sdk && npx --yes jsr publish --dry-run --allow-dirty

      - name: Publish to JSR (OIDC auth, no secret)
        if: ${{ !inputs.dry_run }}
        run: cd packages/sdk && npx --yes jsr publish --allow-dirty

name: cli-release

# Build `akua` CLI binaries for common targets on tag push.
#
# Trigger: push a tag `akua-v<semver>` (e.g. `akua-v0.1.0`). Version
# must match workspace.package.version in Cargo.toml.
#
# Outputs: one `.tar.gz` per target, uploaded as a GitHub Release
# attachment. Shasum file included for checksum verification.

on:
  push:
    tags:
      - 'akua-v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create Releases
  packages: write   # required to push to ghcr.io
  id-token: write   # required for keyless cosign (future)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      # mold — dramatically faster link on Linux. No-op on macOS.
      # Rust 1.90 ships rust-lld as default on x86_64-linux-gnu (mold
      # still edges it); aarch64-linux-gnu still benefits substantially.
      - if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      # `~/.cargo/{registry,git}` + `target/` cache. Without this,
      # every tag push repaid the full cold-compile cost (~6 min
      # each for heavy git deps like kcl-lang). With it, warm runs
      # collapse to link-only time (~1-2 min). One cache per target
      # so the 4 matrix jobs don't stomp each other under the 10 GB
      # per-repo limit.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}
          cache-on-failure: true
          cache-all-crates: true

      - name: Cross-compile for linux/arm64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV

      - name: Rust target
        run: mise exec -- rustup target add ${{ matrix.target }}

      - name: Build embedded Helm engine (Go→wasip1)
        # Required by the `helm-wasm` feature which is in akua-core's
        # default feature set — the resulting `helm-engine.wasm` is
        # included via `include_bytes!` at compile time.
        run: mise exec -- task build:helm-engine-wasm

      - name: Build wasm-bindgen SDK artifacts (needed for tests / embedding)
        run: mise exec -- task sdk:wasm

      - name: Build akua CLI
        # `ci-release` profile: lto off, codegen-units=16, symbols
        # stripped, line-tables-only debug. Trades ~5-10% runtime
        # perf for ~25-40% compile-time reduction. See Cargo.toml.
        run: mise exec -- cargo build -p akua-cli --profile ci-release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          name="akua-${GITHUB_REF_NAME#akua-}-${{ matrix.target }}"
          mkdir -p dist
          cp target/${{ matrix.target }}/ci-release/akua dist/
          cp README.md SECURITY.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar -czf "${name}.tar.gz" akua README.md SECURITY.md LICENSE
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        # `.zip` is idiomatic on Windows and what Scoop/winget expect.
        # 7-Zip is preinstalled on windows-latest runners.
        run: |
          $name = "akua-$($env:GITHUB_REF_NAME -replace '^akua-','')-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/ci-release/akua.exe" -Destination dist/
          Copy-Item README.md,SECURITY.md,LICENSE -Destination dist/ -ErrorAction SilentlyContinue
          Push-Location dist
          7z a "$name.zip" akua.exe README.md SECURITY.md LICENSE
          (Get-FileHash -Algorithm SHA256 "$name.zip").Hash.ToLower() + "  $name.zip" | Out-File -Encoding ascii "$name.zip.sha256"
          Pop-Location

      - uses: actions/upload-artifact@v4
        with:
          name: akua-${{ matrix.target }}
          path: |
            dist/*.tar.gz*
            dist/*.zip*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/akua-v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "akua ${GITHUB_REF_NAME#akua-v}" \
            --notes "See [CHANGELOG.md](https://github.com/cnap-tech/akua/blob/main/CHANGELOG.md) for details." \
            dist/*.tar.gz dist/*.zip dist/*.sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Multi-arch container image — `ghcr.io/cnap-tech/akua:<version>`
  # ---------------------------------------------------------------------------
  # Built separately from the binary jobs so it's not in the release-assets
  # critical path; if container publish fails, the release still ships.
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/akua-v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Linux binaries for the image
        # Pull the prebuilt binaries out of the release tarballs we
        # just built — avoids a separate compile-in-Docker step and
        # keeps the image contents byte-identical to the GitHub Release.
        run: |
          mkdir -p image-context/amd64 image-context/arm64
          version="${GITHUB_REF_NAME#akua-}"
          tar -xzf "dist/akua-${version}-x86_64-unknown-linux-gnu.tar.gz" -C image-context/amd64 akua
          tar -xzf "dist/akua-${version}-aarch64-unknown-linux-gnu.tar.gz" -C image-context/arm64 akua
      - name: Build + push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: image-context
          file: scripts/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/cnap-tech/akua:${{ github.ref_name }}
            ghcr.io/cnap-tech/akua:latest

  # ---------------------------------------------------------------------------
  # Homebrew tap auto-bump — cnap-tech/homebrew-akua
  # ---------------------------------------------------------------------------
  # The tap repo has a `Formula/akua.rb` with stanzas for each platform.
  # This job regenerates URLs + SHA256s and commits the bump. Requires a
  # PAT with `contents:write` on the tap repo stored as `TAP_BUMP_TOKEN`;
  # the default GITHUB_TOKEN is scoped to this repo and can't push to
  # the tap.
  homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/akua-v')
    steps:
      - name: Bump formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: akua
          tap: cnap-tech/homebrew-akua
          download-url: https://github.com/cnap-tech/akua/archive/refs/tags/${{ github.ref_name }}.tar.gz
          # Don't try to edit a non-existent formula on the first run.
          create-pullrequest: false
          commit-message: |
            akua ${{ github.ref_name }}

            Released in https://github.com/cnap-tech/akua/releases/tag/${{ github.ref_name }}
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_BUMP_TOKEN }}
        continue-on-error: true  # tap may not exist on first release

  # winget submission to `microsoft/winget-pkgs` is the only viable
  # public path. Self-hosted winget sources technically work but
  # require code-signed MSIX bundles or `--trust-level trusted`, and
  # Group Policy commonly blocks them — friction too high for OSS
  # distribution. Add a `winget` job here once we're ready to submit
  # manually to `microsoft/winget-pkgs`; it'll just be a
  # `vedantmgoyal9/winget-releaser@main` step with a PAT secret.

name: cli-release

# Build `akua` CLI binaries for common targets on tag push.
#
# Trigger: push a tag `akua-v<semver>` (e.g. `akua-v0.1.0`). Version
# must match workspace.package.version in Cargo.toml.
#
# Outputs: one `.tar.gz` per target, uploaded as a GitHub Release
# attachment. Shasum file included for checksum verification.

on:
  push:
    tags:
      - 'akua-v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create Releases
  packages: write   # required to push to ghcr.io
  id-token: write   # required for keyless cosign (future)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Belt-and-braces gate: render every green example through the
  # tagged commit and byte-diff against the committed `rendered/`
  # goldens before any binaries ship. `task ci` already runs this on
  # every push to main, but a stale-golden between merge and tag
  # would silently produce a release with non-deterministic output.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - uses: rui314/setup-mold@v1
      - name: Install wasm32-wasip1 target
        # release:validate depends on build:render-worker, which
        # compiles akua-render-worker to wasm32-wasip1. Without this
        # target installed, the worker build fails with
        # `can't find crate for core`.
        run: mise exec -- rustup target add wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: validate
          cache-on-failure: true
      - name: task release:validate
        run: mise exec -- task release:validate

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # mold — dramatically faster link on Linux. No-op on macOS.
      # Rust 1.90 ships rust-lld as default on x86_64-linux-gnu (mold
      # still edges it); aarch64-linux-gnu still benefits substantially.
      - if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      # `~/.cargo/{registry,git}` + `target/` cache. Without this,
      # every tag push repaid the full cold-compile cost (~6 min
      # each for heavy git deps like kcl-lang). With it, warm runs
      # collapse to link-only time (~1-2 min). One cache per target
      # so the 4 matrix jobs don't stomp each other under the 10 GB
      # per-repo limit.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}
          cache-on-failure: true
          cache-all-crates: true

      - name: Cross-compile for linux/arm64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV

      - name: Rust target
        run: mise exec -- rustup target add ${{ matrix.target }}

      # Build the embedded engines + render-worker .wasm artefacts
      # before akua-cli's own cargo build. akua-cli's build.rs
      # `include_bytes!`s these — without this step, the matrix runner
      # has no `target/wasm32-wasip1/...` from a prior task invocation
      # (validate runs on a different runner) and build.rs would emit
      # empty bytes, producing a binary that traps on first render.
      # The ci-release profile-detect in build.rs now hard-fails when
      # the worker is missing, so this step is load-bearing for the
      # release matrix and a regression guard for the future.
      - name: Build embedded wasm engines
        run: mise exec -- task build:engines

      - name: Build embedded render-worker
        run: mise exec -- task build:render-worker

      - name: Build akua CLI
        # `ci-release` profile: lto off, codegen-units=16, symbols
        # stripped, line-tables-only debug. Trades ~5-10% runtime
        # perf for ~25-40% compile-time reduction. See Cargo.toml.
        run: mise exec -- cargo build -p akua-cli --profile ci-release --target ${{ matrix.target }}

      # Smoke-test the binary the way an end-user would: `akua init`
      # + `akua render` against the scaffolded Package. Catches any
      # future "binary ships without a worker" / "binary ships without
      # an engine" regression before users see it. Skipped on
      # cross-compiled targets where the runner can't execute the
      # output (linux/arm64 on x86_64 ubuntu, windows binary on linux).
      - name: Smoke-test the built binary
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          set -eu
          bin="$PWD/target/${{ matrix.target }}/ci-release/akua"
          tmp=$(mktemp -d)
          cd "$tmp"
          "$bin" init smoke
          cd smoke
          "$bin" render
          test -d ./deploy
          test -n "$(ls ./deploy)"
          echo "smoke ok: $(ls ./deploy)"

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          name="akua-${GITHUB_REF_NAME#akua-}-${{ matrix.target }}"
          mkdir -p dist
          cp target/${{ matrix.target }}/ci-release/akua dist/
          cp README.md SECURITY.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar -czf "${name}.tar.gz" akua README.md SECURITY.md LICENSE
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        # `.zip` is idiomatic on Windows and what Scoop/winget expect.
        # 7-Zip is preinstalled on windows-latest runners.
        run: |
          $name = "akua-$($env:GITHUB_REF_NAME -replace '^akua-','')-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/ci-release/akua.exe" -Destination dist/
          Copy-Item README.md,SECURITY.md,LICENSE -Destination dist/ -ErrorAction SilentlyContinue
          Push-Location dist
          7z a "$name.zip" akua.exe README.md SECURITY.md LICENSE
          (Get-FileHash -Algorithm SHA256 "$name.zip").Hash.ToLower() + "  $name.zip" | Out-File -Encoding ascii "$name.zip.sha256"
          Pop-Location

      - uses: actions/upload-artifact@v7
        with:
          name: akua-${{ matrix.target }}
          path: |
            dist/*.tar.gz*
            dist/*.zip*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/akua-v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "akua ${GITHUB_REF_NAME#akua-v}" \
            --notes "See [CHANGELOG.md](https://github.com/cnap-tech/akua/blob/main/CHANGELOG.md) for details." \
            dist/*.tar.gz dist/*.zip dist/*.sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Multi-arch container image — `ghcr.io/cnap-tech/akua:<version>`
  # ---------------------------------------------------------------------------
  # Built separately from the binary jobs so it's not in the release-assets
  # critical path; if container publish fails, the release still ships.
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/akua-v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Linux binaries for the image
        # Pull the prebuilt binaries out of the release tarballs we
        # just built — avoids a separate compile-in-Docker step and
        # keeps the image contents byte-identical to the GitHub Release.
        run: |
          mkdir -p image-context/amd64 image-context/arm64
          version="${GITHUB_REF_NAME#akua-}"
          tar -xzf "dist/akua-${version}-x86_64-unknown-linux-gnu.tar.gz" -C image-context/amd64 akua
          tar -xzf "dist/akua-${version}-aarch64-unknown-linux-gnu.tar.gz" -C image-context/arm64 akua
      - name: Build + push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: image-context
          file: scripts/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/cnap-tech/akua:${{ github.ref_name }}
            ghcr.io/cnap-tech/akua:latest

  # ---------------------------------------------------------------------------
  # Homebrew tap auto-bump — cnap-tech/homebrew-tap
  # ---------------------------------------------------------------------------
  # Edits `Formula/akua.rb` in the generic CNAP tap with the new
  # version + per-platform sha256s, then commits + pushes over SSH.
  #
  # Auth: `TAP_BUMP_SSH_KEY` is an SSH deploy key registered on the
  # tap repo only (write access, zero reach anywhere else). No PATs,
  # no account-level tokens — if this key leaks, the blast radius is
  # one repo whose only content is Homebrew formulas.
  homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/akua-v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Configure SSH for the tap repo
        env:
          TAP_BUMP_SSH_KEY: ${{ secrets.TAP_BUMP_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$TAP_BUMP_SSH_KEY" > ~/.ssh/tap_bump_key
          chmod 600 ~/.ssh/tap_bump_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host github.com-tap
            HostName github.com
            User git
            IdentityFile ~/.ssh/tap_bump_key
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone tap, rewrite formula, push
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          version="${REF_NAME#akua-v}"

          # Read each target's sha256 from the per-asset .sha256 file.
          get_sha() {
            awk '{print $1}' "dist/akua-v${version}-$1.tar.gz.sha256"
          }
          darwin_arm_sha=$(get_sha aarch64-apple-darwin)
          darwin_x86_sha=$(get_sha x86_64-apple-darwin)
          linux_arm_sha=$(get_sha aarch64-unknown-linux-gnu)
          linux_x86_sha=$(get_sha x86_64-unknown-linux-gnu)

          git clone git@github.com-tap:cnap-tech/homebrew-tap.git tap
          cd tap
          git config user.email "akua-tap-bumper@cnap-tech"
          git config user.name  "akua-tap-bumper"

          # Rewrite the whole formula. Simpler than four sed passes,
          # and the formula shape is our own — no surprise stanzas
          # another maintainer might have added mid-file.
          cat > Formula/akua.rb <<RUBY
          # frozen_string_literal: true

          # Auto-bumped by cli-release.yml in cnap-tech/akua on every
          # tag push. Manual edits get overwritten.
          class Akua < Formula
            desc "Cloud-native package build, transform, and preview toolkit"
            homepage "https://github.com/cnap-tech/akua"
            version "${version}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/cnap-tech/akua/releases/download/akua-v#{version}/akua-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${darwin_arm_sha}"
              end
              on_intel do
                url "https://github.com/cnap-tech/akua/releases/download/akua-v#{version}/akua-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${darwin_x86_sha}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/cnap-tech/akua/releases/download/akua-v#{version}/akua-v#{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${linux_arm_sha}"
              end
              on_intel do
                url "https://github.com/cnap-tech/akua/releases/download/akua-v#{version}/akua-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${linux_x86_sha}"
              end
            end

            def install
              bin.install "akua"
              doc.install "README.md", "SECURITY.md" if File.exist?("README.md")
            end

            test do
              assert_match(/akua/, shell_output("#{bin}/akua --version"))
            end
          end
          RUBY

          git add Formula/akua.rb
          if git diff --cached --quiet; then
            echo "formula already at ${version}, nothing to bump"
            exit 0
          fi
          git commit -m "akua ${REF_NAME}

          Released in https://github.com/cnap-tech/akua/releases/tag/${REF_NAME}"
          git push

  # winget submission to `microsoft/winget-pkgs` is the only viable
  # public path. Self-hosted winget sources technically work but
  # require code-signed MSIX bundles or `--trust-level trusted`, and
  # Group Policy commonly blocks them — friction too high for OSS
  # distribution. Add a `winget` job here once we're ready to submit
  # manually to `microsoft/winget-pkgs`; it'll just be a
  # `vedantmgoyal9/winget-releaser@main` step with a PAT secret.

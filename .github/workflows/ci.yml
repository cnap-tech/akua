name: CI

# Local debugging: `task ci` runs exactly what this workflow runs. Any
# command you see here either lives in Taskfile.yml or is mise/actions
# boilerplate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Full CI pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # mise owns every tool version — pinned in .mise.toml.
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - uses: Swatinem/rust-cache@v2

      # `task ci` = build wasm → fmt:check → lint → test → wasm:smoke.
      - name: task ci
        run: mise exec -- task ci

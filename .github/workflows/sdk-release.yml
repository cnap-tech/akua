name: sdk-release

# Publish `@akua-dev/sdk` to npm on a `sdk-v<semver>` tag push.
#
# The SDK ships compiled JS + .d.ts (no raw TS); end users get a
# normal npm install. The matching `@akua-dev/native@<same-version>`
# must already be published — release it first via native-release.yml,
# then tag `sdk-v<semver>`. SDK version floats independently of the
# CLI's crate version: doc tweaks or wrapper-layer fixes ship without
# rebuilding the binary.

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Skip the actual publish (build + npm pack --dry-run only)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write  # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # The Rust generator writes into packages/sdk/src/{types,schemas}.
      # Regenerate on the runner so we publish from the same bytes main
      # CI just verified — a tag pushed from a stale checkout must not
      # silently publish stale types.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sdk-release
          cache-on-failure: true

      - name: Regenerate SDK types + schema bundle
        run: mise exec -- task sdk:gen

      - name: Drift guard (fail if Rust source and bindings diverge)
        run: mise exec -- task sdk:check

      - name: Bump package.json version from the tag
        # Tag format: `sdk-v1.2.3` → npm version `1.2.3`. Strip the
        # `sdk-v` prefix and rewrite both `version` and the pinned
        # `@akua-dev/native` dep so the SDK pulls the matching native.
        run: |
          set -eu
          version="${GITHUB_REF_NAME#sdk-v}"
          echo "Publishing @akua-dev/sdk@${version}"
          jq --arg v "$version" \
            '.version = $v | .dependencies["@akua-dev/native"] = $v' \
            packages/sdk/package.json > packages/sdk/package.json.tmp
          mv packages/sdk/package.json.tmp packages/sdk/package.json

      - name: Verify matching @akua-dev/native is on npm
        # Fail fast if the user tagged the SDK before the native
        # release landed — otherwise the published SDK would 404 on
        # `npm install` for end users.
        run: |
          set -eu
          version="${GITHUB_REF_NAME#sdk-v}"
          if ! npm view "@akua-dev/native@${version}" version > /dev/null 2>&1; then
            echo "ERROR: @akua-dev/native@${version} is not on npm yet."
            echo "Tag and publish native-v${version} first, then re-tag sdk-v${version}."
            exit 1
          fi

      - name: Build SDK (bun bundle + tsc declarations)
        run: mise exec -- task sdk:build

      - name: Pack dry-run (manifest sanity)
        working-directory: packages/sdk
        run: npm pack --dry-run

      - name: Publish to npm
        # Auth via npm trusted publishing (OIDC). No NPM_TOKEN needed —
        # each package on npmjs.com has GitHub Actions configured as a
        # trusted publisher pointing at this repo + workflow.
        if: github.event_name == 'push' || inputs.dry-run == false
        working-directory: packages/sdk
        run: npm publish --access public --provenance

name: sdk-release

# Publish `@akua-dev/sdk` to npm on a `sdk-v<semver>` tag push.
#
# The SDK ships compiled JS + .d.ts (no raw TS); end users get a
# normal npm install. The matching `@akua-dev/native@<same-version>`
# must be on npm before this workflow publishes; the wait step below
# polls for up to 20 min so you can fire `native-v0.x.y` and
# `sdk-v0.x.y` together — sdk-release blocks until native lands. SDK
# version floats independently of the CLI's crate version: doc tweaks
# or wrapper-layer fixes ship without rebuilding the binary.

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Skip the actual publish (build + npm pack --dry-run only)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write  # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - uses: actions/setup-node@v6
        # Node 24 for npm 11+ (OIDC trusted-publishing support);
        # see native-release.yml for the full rationale.
        with:
          node-version: '24'

      # The Rust generator writes into packages/sdk/src/{types,schemas}.
      # Regenerate on the runner so we publish from the same bytes main
      # CI just verified — a tag pushed from a stale checkout must not
      # silently publish stale types.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sdk-release
          cache-on-failure: true

      - name: Regenerate SDK types + schema bundle
        run: mise exec -- task sdk:gen

      - name: Drift guard (fail if Rust source and bindings diverge)
        run: mise exec -- task sdk:check

      - name: Bump package.json version from the tag
        # Tag format: `sdk-v1.2.3` → npm version `1.2.3`. Strip the
        # `sdk-v` prefix and rewrite both `version` and the pinned
        # `@akua-dev/native` dep so the SDK pulls the matching native.
        run: |
          set -eu
          version="${GITHUB_REF_NAME#sdk-v}"
          echo "Publishing @akua-dev/sdk@${version}"
          jq --arg v "$version" \
            '.version = $v | .dependencies["@akua-dev/native"] = $v' \
            packages/sdk/package.json > packages/sdk/package.json.tmp
          mv packages/sdk/package.json.tmp packages/sdk/package.json

      - name: Wait for matching @akua-dev/native on npm
        # native-release.yml + sdk-release.yml are independent
        # workflows — when both tags get pushed together, sdk-release
        # may reach this step before native-release finishes its 7-
        # platform matrix + publish. Poll the registry for up to
        # 20 min (native publishes within ~12-15 min of tag in the
        # worst case); fast path on a sequenced release is one npm
        # view call (~1 s).
        run: |
          set -eu
          version="${GITHUB_REF_NAME#sdk-v}"
          deadline=$((SECONDS + 1200))
          while ! npm view "@akua-dev/native@${version}" version > /dev/null 2>&1; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "ERROR: @akua-dev/native@${version} did not appear on npm within 20 min."
              echo "Either native-release.yml failed, or you forgot to push native-v${version}."
              exit 1
            fi
            echo "@akua-dev/native@${version} not on npm yet — retry in 30 s..."
            sleep 30
          done
          echo "@akua-dev/native@${version} is on npm — proceeding with sdk publish."

      - name: Build SDK (bun bundle + tsc declarations)
        run: mise exec -- task sdk:build

      - name: Pack dry-run (manifest sanity)
        working-directory: packages/sdk
        run: npm pack --dry-run

      - name: Publish to npm
        # Auth via npm trusted publishing (OIDC). No NPM_TOKEN needed —
        # each package on npmjs.com has GitHub Actions configured as a
        # trusted publisher pointing at this repo + workflow.
        if: github.event_name == 'push' || inputs.dry-run == false
        working-directory: packages/sdk
        run: npm publish --access public --provenance

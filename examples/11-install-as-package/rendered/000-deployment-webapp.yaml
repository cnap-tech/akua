apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  labels:
    install.cnap.tech/tenant: acme
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - image: nginx:1.27
        name: webapp
        ports:
        - containerPort: 80

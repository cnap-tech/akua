# Minimal helmfile — one release of a public chart.
# Akua's helmfile engine runs `helmfile template` and captures the
# concatenated manifests as a single subchart.

releases:
  - name: podinfo
    namespace: default
    chart: oci://ghcr.io/stefanprodan/charts/podinfo
    version: 6.11.2
    values:
      - replicaCount: 1

apiVersion: akua.dev/v1alpha1

name: hybrid-package
version: 0.1.0
description: |
  Two sources in one umbrella: an upstream Helm chart (nginx from Bitnami)
  and a locally-authored KCL program that emits a ConfigMap referenced by
  the nginx deployment. Demonstrates mixed-engine assembly.

sources:
  # Pulled at build time from the Bitnami Helm repo.
  - name: web
    helm:
      repo: https://charts.bitnami.com/bitnami
      chart: nginx
      version: 18.1.0
    values:
      replicaCount: 2

  # Compiled at build time from ./site-config.k — engine emits rendered
  # Kubernetes YAML and wraps it as a static Helm subchart.
  - name: site-config
    kcl:
      entrypoint: ./site-config.k
      version: 0.1.0

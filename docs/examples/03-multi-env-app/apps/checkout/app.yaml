# App KRM — the per-install instance. References the Package by OCI ref.
# One App resource covers all environments; per-env inputs live in ./inputs/.
apiVersion: akua.dev/v1alpha1
kind: App
metadata:
  name: checkout
  namespace: payments
  labels:
    team: payments
    app.kubernetes.io/name: checkout
spec:
  package: oci://pkg.akua.dev/webapp-postgres:1.0

  # Per-environment input overlays.
  # Each file satisfies the Package's schema for its environment.
  inputs:
    dev:        { $file: inputs/dev.yaml }
    staging:    { $file: inputs/staging.yaml }
    production: { $file: inputs/production.yaml }

  # Reconciliation target per environment.
  targets:
    dev:        { reconciler: argo, cluster: dev-eu }
    staging:    { reconciler: argo, cluster: staging-eu }
    production: { reconciler: argo, cluster: prod-eu }

# Cargo config — honoured by every `cargo` invocation in this workspace.
#
# Scope: link-time acceleration on Linux via mold. macOS uses its
# default linker (ld-prime is already fast); no overrides there.
# Rust 1.90+ ships rust-lld as default on x86_64-unknown-linux-gnu —
# the mold override is a small additional win there, a larger one on
# aarch64-unknown-linux-gnu where rust-lld isn't default yet.
#
# CI installs mold via `rui314/setup-mold@v1`. For local dev on Linux,
# `apt install mold` works; on macOS mold isn't supported, so these
# sections are silently ignored.

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# aarch64 cross: `aarch64-linux-gnu-gcc` doesn't pick up `setup-mold`'s
# host-installed mold without extra plumbing (needs its own mold binary
# under the right `binutils`-style name, or `--ld-path`). Skip the mold
# override here — rust-cache still gives the big win, and cross-link
# is never the bottleneck on realistic Rust projects.
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
